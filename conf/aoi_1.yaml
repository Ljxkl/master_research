# グループ選択モードの設定
sbas:
  choose_group: "max_aoi_overlap"  # または "largest"
  max_temporal_days: 48
  k_neighbors: 2
  ensure_chain: true
  enforce_same_frame: true
  
  # 取得枚数調整
  thin_acquisitions:
    min_repeat_days: null
    max_acquisitions: 10
    keep_ends: true

# ダウンロード設定
s1_download:
  out_dir: "data/"
  dry_search_only: false
  show_progress: true
  skip_existing: true
  processes: 8
  max_results: 5000
  platform: "Sentinel-1A"         # "Sentinel-1A" など指定可
  beam_mode: "IW"
  processing_level: "SLC"
  aoi_shrink_m: 0         # AOI を何メートル縮小するか

# 基本設定
aoi_bbox:
  lower_left: [140.066476, 35.371794]
  upper_right: [140.078943, 35.381027]
date_start: "2023-01-01"
date_end: "2025-12-31"
orbit_direction: "ASCENDING"  # ASCENDING/DESCENDING/BOTH
project_dir: "/home/jmrsl/research/"